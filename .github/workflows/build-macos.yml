name: Build macOS

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (no v prefix), e.g. 2.0.0"
        required: false
        default: "2.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Resolve release version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "REL_VERSION=${{ inputs.version }}" >> "$GITHUB_ENV"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "REL_VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"
          fi

      - name: Set package version
        if: env.REL_VERSION != ''
        run: npm pkg set version="${REL_VERSION}"

      # Decide once whether a signing certificate is available. We deliberately do
      # NOT expose CSC_LINK as an inherited env var: electron-builder treats the mere
      # presence of CSC_LINK (even empty) as "sign this", then fails trying to decode
      # the empty value ("... not a file"). So we only set signing env when a real
      # certificate exists.
      - name: Detect signing certificate
        id: detect
        env:
          HAS_CERT: ${{ secrets.CSC_LINK != '' }}
        run: echo "signed=$HAS_CERT" >> "$GITHUB_OUTPUT"

      - name: Import signing certificate
        if: steps.detect.outputs.signed == 'true'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          security create-keychain -p actions $KEYCHAIN
          security default-keychain -s $KEYCHAIN
          security unlock-keychain -p actions $KEYCHAIN
          echo "$CSC_LINK" | base64 --decode > cert.p12
          security import cert.p12 -k $KEYCHAIN -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions $KEYCHAIN
          security find-identity -v -p codesigning $KEYCHAIN
          echo "CSC_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Build (DMG, arm64 + x64)
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # true → identity discovered from the imported keychain; false → unsigned app.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ steps.detect.outputs.signed }}
          # Notarization (only effective when signed and these secrets are set).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmgs
          path: |
            dist/*.dmg
            dist/*.blockmap

      - name: Publish release
        if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.REL_VERSION }}
          prerelease: ${{ contains(env.REL_VERSION, '-') }}
          generate_release_notes: true
          files: |
            dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
